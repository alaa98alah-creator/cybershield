name: cybershield
description: "AI-powered cybersecurity mobile app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.4.0
  flutter_riverpod: ^2.5.0
  go_router: ^14.0.0
  flutter_secure_storage: ^9.2.0
  file_picker: ^8.0.0
  google_fonts: ^6.2.0
  flutter_svg: ^2.0.10
  flutter_animate: ^4.5.0
  smooth_page_indicator: ^1.2.0
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
